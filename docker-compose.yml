services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  smscsim:
    image: localhost/smscsim-fixed:latest
    ports:
      - "2776:2775"
      - "12775:12775"
    restart: unless-stopped
